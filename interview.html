<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Interview Questions</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>

<div id="particles-js"></div>
<div class="sidebar">

    <div class="logo-area">

        <h1>🚀 CIP</h1>

        <p>Career Intelligence</p>

    </div>

    <nav>

        <a href="dashboard.html">
            🏠 Dashboard
        </a>

        <a href="upload.html">
            📄 Upload Resume
        </a>

        <a href="interview.html">
            🎤 Interview AI
        </a>

        <a href="heatmap.html">
            🧠 Skill Heatmap
        </a>

        <a href="assistant.html">
            🤖 AI Assistant
        </a>

    </nav>

</div>

<div class="container">

    <h1>🎤 AI Interview Simulator</h1>

    <div class="ai-orb">

        <div class="orb-core"></div>

        <p id="orbText">
            AI Interview System Ready
        </p>

    </div>

    <div class="interview-card">

        <h2>🤖 AI Interviewer</h2>

        <div id="questionBox">

            Welcome Candidate.
            Press Start Interview.

        </div>

        <button onclick="startInterview()">
            Start Interview
        </button>

        <button onclick="nextQuestion()">
            Next Question
        </button>

    </div>

    <div class="analytics-card full-card">

        <h2>📊 Confidence Meter</h2>

        <div class="dna-bar">

            <div
            id="confidenceFill"
            class="dna-fill"
            style="width:75%">
            </div>

        </div>

        <br>

        <p id="confidenceText">
            Confidence Level: 75%
        </p>

    </div>

</div>

<script src="script.js"></script>
<script type="module" src="interview-cloud.js"></script>

</body>
</html>
